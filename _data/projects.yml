- name: "Voice-Controlled Audio Recorder"
  description: "Battery-powered ESP32-S3 voice recorder with on-device wake word detection using Edge Impulse. Custom-trained neural network recognizes spoken keywords (start, stop, play) to control recording hands-free. Features I2S MEMS microphone (SPH0645LM4H) and Class-D amplifier (MAX98357A) for full-duplex audio, NimBLE BLE for wireless control and 51.6 KB/s file transfer, SD card + LittleFS dual storage, and automatic low-power management with light/deep sleep modes. ESP32-S3 SIMD vector instructions accelerate inference via ESP-NN optimized kernels. Includes a Python tkinter GUI for collecting keyword training data with voice-triggered capture and clip review."
  github_url: "https://github.com/bmkuter/Audio_recorder_demo"
  status: "Active Development"
  language: "C/ESP-IDF"
  last_updated: "2026-02-26"
  latest_update: "Edge Impulse wake word detection fully operational on ESP32-S3 with PSRAM-accelerated inference. Currently retraining model for multi-keyword support (start/stop/play). Built custom training data collection GUI with voice-triggered recording and review system. All subsystems complete: I2S mic+amp, BLE, storage, power management, board HAL."
  demo_url: "/ongoing"
  has_3d_models: false
  is_private_repo: true

- name: "ESP-Camera"
  description: "WiFi-enabled ESP32-S3 camera system for the GrowPod project. Features high-resolution QXGA (2048x1536) image capture, live MJPEG preview stream, web-based camera controls, and mDNS support. Built on Seeed Studio XIAO ESP32S3 Sense with OV3660 camera module and 8MB PSRAM for high-speed image buffering."
  github_url: "https://github.com/bmkuter/ESP-Camera"
  status: "Complete"
  language: "C/ESP-IDF"
  last_updated: "2026-01-11"
  latest_update: "Completed WiFi camera system with web interface for remote plant monitoring. Achieves ~1.5 second capture-to-transfer time with optimized PSRAM configuration. Includes Python client for automated image capture and HTTP API for camera control."
  demo_url: "/ongoing"
  has_3d_models: false

- name: "MIDI Box"
  description: "A digital signal processing device built on Teensy 4.1 (NXP RT1062) that takes MIDI input from keyboards and converts notes to user-selectable scales in real-time. Features an OLED display and rotary encoder for scale selection."
  github_url: "https://github.com/bmkuter/Midi_Box"
  status: "Complete"
  language: "C++/Arduino"
  last_updated: "2023-11-14"
  latest_update: "Project completed with full functionality. Users can select from various scales (major, minor, pentatonic, etc.) and root notes using the rotary encoder interface. All MIDI input is processed and converted in real-time."
  demo_url: "/ongoing"
  has_3d_models: false

- name: "Weather Mesh Lite"
  description: "A network of interconnected weather monitoring devices creating a mesh network for hyperlocal weather data collection and prediction using ESP32 microcontrollers. Features a custom blockchain implementation between nodes to mitigate bad actors injecting false data. Nodes participate in an election process to take turns calculating the next block, with validation performed by the rest of the network to ensure data integrity."
  github_url: "https://github.com/bmkuter/Weather_Mesh_Lite"
  status: "Complete"
  language: "C/ESP-IDF"
  last_updated: "2025-04-07"
  latest_update: "Working on implementing the mesh network protocol using ESP32 devices. Successfully tested basic sensor readings and wireless communication between two nodes."
  demo_url: "/ongoing"
  has_3d_models: true

- name: "Coffee Bean Smart Doser"
  description: "An intelligent coffee bean dosing system that precisely measures and dispenses coffee beans based on brewing method, bean density, and desired strength. Currently in 3D modeling phase."
  github_url: "https://github.com/bmkuter/Coffee_Bean_Smart_Doser"
  status: "Ongoing"
  language: "C/ESP-IDF"
  last_updated: "2025-10-12"
  latest_update: "GitHub repository created with initial demo code. Currently designing the mechanical components and 3D models for the dispensing mechanism. Planning to use load cells for precise weight measurement and stepper motors for controlled dispensing."
  demo_url: "/ongoing"
  has_3d_models: true

- name: "GrowPod"
  description: "An intelligent, energy-efficient Deep Water Culture (DWC) hydroponic system designed for scalable at-home food production and scientific plant research. Features ESP32-S3 control, custom capacitive water level sensing (FDC1004), automated peristaltic pumps for water recycling, and a Python GUI console with real-time monitoring, historical data logging, and individual LED channel control."
  github_url: "https://github.com/bmkuter/GrowPod"
  status: "Active Development"
  language: "C/ESP-IDF"
  last_updated: "2026-01-06"
  latest_update: "Major updates in December 2024: Added Python GUI console with mDNS device discovery, 2-hour sensor data cache with SQLite storage, advanced 4-channel LED control with bidirectional sync, auto-refresh dashboard, and CSV export. Implemented non-contact capacitive water level sensing through FDC1004. System now features complete water cycle control with real-time power monitoring."
  demo_url: "/ongoing"
  has_3d_models: true

- name: "Daily Idea Planner"
  description: "A full-stack web application for brainstorming and organizing ideas with AI-powered clustering, semantic search, and interactive graph visualization. Features React+TypeScript frontend with Vite, Node.js serverless backend, Groq AI integration for idea generation, and real-time knowledge graph using ReactFlow. Includes Google OAuth2 for cloud backup, hybrid search combining keywords and embeddings, and project management with tag-based clustering. Live demo available at https://dailyideaplanner.vercel.app/"
  github_url: "https://github.com/bmkuter/Daily_Note_App"
  status: "Active Development"
  language: "TypeScript/React"
  last_updated: "2026-02-07"
  latest_update: "February 2026: Implemented comprehensive idea lifecycle management with visual state indicators (active, in-progress, done, archived). Added context menus for state changes, filter controls with live counts, and opacity-based visual feedback. Enhanced graph visualization with project tags becoming centroids, making project names the central nodes with related ideas connected. All state data persists across local and cloud backups."
  demo_url: "https://dailyideaplanner.vercel.app/"
  has_3d_models: false
  is_private_repo: true
