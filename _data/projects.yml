- name: "Refinding Magic: The Gathering"
  description: "A deck-first MTG management tool focused on building, testing, and iterating on legal Commander decks. Features a 4-step AI deck builder wizard (concept → themes → Scryfall candidates → assembled deck), Groq-powered coaching with full oracle text context for all 100 cards (Analyse / Improve / Rebuild modes), persistent free-form deck chat, combo & interaction discovery, AI strategy generation with combo groups and tutor lines, semantic card search (NL → Scryfall), and an interactive goldfish playfield with grid battlefield, commander zone, turn counter, browsable zone piles, and zoom controls. Scryfall-grounded suggestions use oracle-aware cut scoring, commander protection, and force-include for user-requested cards."
  github_url: "https://github.com/bmkuter/MTG_Deck_Manager"
  status: "Active Development"
  language: "TypeScript/React"
  last_updated: "2026-03-29"
  latest_update: "March 2026: Added persistent deck chat — free-form conversational AI about your deck with full oracle text context and chat history. Overhauled the Improve pipeline with oracle-aware cut scoring, strategy context injection, commander protection, and force-include for user-suggested cards. Added interactive goldfish playfield with grid battlefield, commander zone, turn counter, zone management, and zoom controls."
